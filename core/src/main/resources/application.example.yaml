# Copy this file to application-local.yaml for local development.
# Do not commit real credentials to Git.

spring:
  application:
    name: flowloop
  datasource:
    url: jdbc:postgresql://localhost:5432/flowloop
    username: postgres
    password: change-me
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email
    password: your-mail-app-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: your-deepseek-key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    zhipuai:
      api-key: your-zhipuai-key
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.6

mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ./data/documents
